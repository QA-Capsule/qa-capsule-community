name: API Tests | Newman (Postman)

on:
  workflow_dispatch:

jobs:
  run-newman:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: npm install -g newman newman-reporter-junitfull

      - name: Run Newman Tests
        run: |
          newman run tests/newman/collection.json \
            --reporters cli,junitfull \
            --reporter-junitfull-export newman-results.xml
        continue-on-error: true

      - name: Send Alert to QA Capsule
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_NEWMAN_KEY }}
        run: |
          chmod +x .github/scripts/upload-junit-to-qacapsule.sh
          .github/scripts/upload-junit-to-qacapsule.sh newman-results.xml Postman "${{ github.run_id }}"

      - name: MCP Healing Gate
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_NEWMAN_KEY }}
        run: |
          chmod +x .github/scripts/healing-gate.sh
          .github/scripts/healing-gate.sh "${{ github.run_id }}" Postman

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.xml
          if-no-files-found: ignore
