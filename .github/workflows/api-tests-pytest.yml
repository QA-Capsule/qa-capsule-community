name: API Tests | Pytest

on:
  workflow_dispatch:

jobs:
  run-pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r tests/pytest/requirements.txt

      - name: Run Pytest
        run: pytest tests/pytest/ -v --junitxml=pytest-results.xml
        continue-on-error: true

      - name: Send Alert to QA Capsule
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_PYTEST_KEY }}
        run: |
          curl -X POST "$WEBHOOK_URL/api/webhooks/upload?framework=Pytest" \
            -H "X-API-Key: $API_KEY" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Execution-Env: STAGING" \
            -H "X-Execution-Type: TEST-RUN" \
            -F "file=@pytest-results.xml"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: ignore
