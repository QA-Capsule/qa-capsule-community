name: E2E Tests | Cypress

on:
  workflow_dispatch:

jobs:
  run-cypress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        working-directory: tests/cypress

      - name: Run Cypress Tests
        run: npm run test:ci
        working-directory: tests/cypress
        continue-on-error: true

      - name: Send Alert to QA Capsule
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_CYPRESS_KEY }}
        run: |
          curl -X POST "$WEBHOOK_URL/api/webhooks/upload?framework=Cypress" \
            -H "X-API-Key: $API_KEY" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Execution-Env: STAGING" \
            -H "X-Execution-Type: TEST-RUN" \
            -F "file=@tests/cypress/cypress-results.xml"

      - name: MCP Healing Gate
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_CYPRESS_KEY }}
        run: |
          curl -s -X POST "$WEBHOOK_URL/api/healing/gate" \
            -H "X-API-Key: $API_KEY" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Framework: Cypress" \
            | tee healing-report.json || true
          echo "--- MCP Healing Report ---"
          cat healing-report.json 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: tests/cypress/cypress-results.xml
          if-no-files-found: ignore
