name: E2E Tests | Playwright

# Trigger on push / PR to main branches, or manually.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest

    # Required secrets (GitHub → Settings → Secrets and variables → Actions):
    #   QA_CAPSULE_URL                : Base URL of your QA Capsule instance
    #   QA_CAPSULE_API_PLAYWRIGHT_KEY : API key of the Playwright gateway project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/playwright/package.json

      - name: Install npm dependencies
        run: npm install
        working-directory: tests/playwright

      - name: Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium
        working-directory: tests/playwright

      # ── Run the full practice_login suite ──────────────────────────────────
      # continue-on-error keeps the job alive so the upload step always runs.
      # The qa-capsule-reporter.js captures page HTML on each failure and
      # writes it to stderr; Playwright's JUnit reporter stores it in
      # <system-err> of the failing <testcase>.
      - name: Run Playwright tests
        id: playwright_run
        run: npx playwright test
        working-directory: tests/playwright
        continue-on-error: true

      # ── Step 1: Upload JUnit XML to QA Capsule ─────────────────────────────
      - name: Upload results to QA Capsule
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          QA_CAPSULE_API_PLAYWRIGHT_KEY: ${{ secrets.QA_CAPSULE_API_PLAYWRIGHT_KEY }}
        run: |
          echo "Uploading JUnit XML to QA Capsule..."
          HTTP_STATUS=$(curl -s -o /tmp/qac-ingest.json -w "%{http_code}" \
            -X POST "${QA_CAPSULE_URL}/api/webhooks/upload?framework=Playwright" \
            -H "X-API-Key: ${QA_CAPSULE_API_PLAYWRIGHT_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}-${{ github.run_attempt }}" \
            -H "X-Commit-Sha: ${{ github.sha }}" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Execution-Env: STAGING" \
            -H "X-Execution-Type: TEST-RUN" \
            -F "file=@tests/playwright/playwright-results.xml")

          echo "QA Capsule HTTP status: $HTTP_STATUS"
          cat /tmp/qac-ingest.json

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "WARNING: ingestion returned HTTP $HTTP_STATUS. Check your secrets."
          else
            echo "Results queued for processing."
          fi

      # ── Step 2: Self-Healing Gate ──────────────────────────────────────────
      - name: Self-Healing Gate
        if: steps.playwright_run.outcome == 'failure'
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          QA_CAPSULE_API_PLAYWRIGHT_KEY: ${{ secrets.QA_CAPSULE_API_PLAYWRIGHT_KEY }}
        run: |
          echo "Waiting for QA Capsule to process the results..."
          sleep 10

          echo "Calling Self-Healing Gate..."
          curl -s \
            -X POST "${QA_CAPSULE_URL}/api/healing/gate" \
            -H "X-API-Key: ${QA_CAPSULE_API_PLAYWRIGHT_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Framework: Playwright" \
            | tee /tmp/healing-report.json || true

          echo ""
          echo "--- Self-Healing Report ---"
          if command -v jq &>/dev/null; then
            jq '.' /tmp/healing-report.json 2>/dev/null || cat /tmp/healing-report.json
          else
            cat /tmp/healing-report.json
          fi
          echo ""
          echo "Open QA Capsule -> Self-Healing Hub to view the full AI fix proposal."
          echo "In Cursor: run the heal_incident MCP tool with the incident ID shown above."

      # ── Step 3: Fail the pipeline on test failures ─────────────────────────
      - name: Fail pipeline on test failures
        if: steps.playwright_run.outcome == 'failure'
        run: |
          echo "FAILED: One or more Playwright tests failed."
          echo "Check QA Capsule -> Self-Healing Hub for AI fix proposals."
          exit 1

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: tests/playwright/playwright-results.xml
          if-no-files-found: ignore
