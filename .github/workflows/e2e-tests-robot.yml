name: E2E Tests | Robot Framework

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  robot:
    runs-on: ubuntu-latest

    # Required secrets in GitHub → Settings → Secrets and variables → Actions:
    #   QA_CAPSULE_URL           → Base URL of your QA Capsule instance (e.g. https://your-instance.com)
    #   QA_CAPSULE_API_ROBOT_KEY → API Key of the Robot gateway project in QA Capsule

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install robotframework robotframework-browser

      - name: Install Playwright Browsers
        run: rfbrowser init chromium

      - name: Run Robot Tests
        # continue-on-error keeps the pipeline alive so the upload step always runs
        id: robot_run
        run: |
          robot \
            --outputdir tests/results \
            --xunit    robot-junit.xml \
            --log      robot-log.html \
            --report   robot-report.html \
            --listener tests/robotframework/resources/dom_capture_listener.py \
            --variable BROWSER:chromium \
            tests/robotframework/login_broken_selector.robot
        continue-on-error: true

      # ── Step 1 : Send results to QA Capsule (JUnit XML upload) ───────────────
      - name: Upload Results to QA Capsule
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          QA_CAPSULE_API_ROBOT_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
        run: |
          echo "Uploading JUnit XML to QA Capsule..."
          HTTP_STATUS=$(curl -s -o /tmp/qac-ingest.json -w "%{http_code}" \
            -X POST "${QA_CAPSULE_URL}/api/webhooks/upload?framework=RobotFramework" \
            -H "X-API-Key: ${QA_CAPSULE_API_ROBOT_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}-${{ github.run_attempt }}" \
            -H "X-Commit-Sha: ${{ github.sha }}" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Execution-Env: STAGING" \
            -H "X-Execution-Type: TEST-RUN" \
            -F "file=@tests/results/robot-junit.xml")

          echo "QA Capsule response (HTTP $HTTP_STATUS):"
          cat /tmp/qac-ingest.json

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "WARNING: QA Capsule ingestion returned HTTP $HTTP_STATUS - check your secrets."
          else
            echo "Results queued for processing."
          fi

      # ── Step 2 : Self-Healing Gate ─────────────────────────────────────────
      # This step asks QA Capsule to look for open incidents from this run
      # and return the Gemini-powered healing context for each failure.
      # Configure Gemini first in QA Capsule UI → Settings → AI & Self-Healing.
      - name: Self-Healing Gate (Gemini)
        if: steps.robot_run.outcome == 'failure'
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          QA_CAPSULE_API_ROBOT_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
        run: |
          echo "Querying QA Capsule Self-Healing Gate..."

          # Give the async ingest worker a few seconds to process the XML
          sleep 10

          curl -s \
            -X POST "${QA_CAPSULE_URL}/api/healing/gate" \
            -H "X-API-Key: ${QA_CAPSULE_API_ROBOT_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Framework: RobotFramework" \
            | tee /tmp/healing-report.json || true

          echo ""
          echo "--- QA Capsule: Self-Healing Report ---"
          # Pretty-print if jq is available, otherwise raw output
          if command -v jq &>/dev/null; then
            jq '.' /tmp/healing-report.json 2>/dev/null || cat /tmp/healing-report.json
          else
            cat /tmp/healing-report.json
          fi
          echo ""
          echo "Open QA Capsule -> Self-Healing Hub to view the full AI fix proposal."

      # ── Step 3 : Fail the pipeline if tests failed ────────────────────────
      - name: Fail Pipeline on Test Failures
        if: steps.robot_run.outcome == 'failure'
        run: |
          echo "FAILED: Robot tests failed. Check QA Capsule -> Self-Healing Hub for AI fix proposals."
          exit 1

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload Robot Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ github.run_id }}
          path: |
            tests/results/robot-junit.xml
            tests/results/robot-log.html
            tests/results/robot-report.html
          if-no-files-found: ignore
