name: E2E Tests | Robot Framework

# Trigger on push / PR to main branches, or manually.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  robot:
    runs-on: ubuntu-latest

    # Required secrets (GitHub → Settings → Secrets and variables → Actions):
    #   QA_CAPSULE_URL           : Base URL of your QA Capsule instance
    #   QA_CAPSULE_API_ROBOT_KEY : API key of the Robot gateway project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Robot Framework and Browser library
        run: |
          pip install --upgrade pip
          pip install robotframework robotframework-browser

      - name: Install Playwright browsers for Robot
        run: rfbrowser init chromium

      # ── Run the full practice_login suite ──────────────────────────────────
      # continue-on-error keeps the job alive so the upload step always runs,
      # even when one or more tests fail.
      - name: Run Robot Framework tests
        id: robot_run
        run: |
          robot \
            --outputdir tests/results \
            --xunit     robot-junit.xml \
            --log       robot-log.html \
            --report    robot-report.html \
            --listener  tests/robotframework/resources/dom_capture_listener.py \
            tests/robotframework/practice_login.robot \
            tests/robotframework/smoke_tests.robot \
            tests/robotframework/api_health.robot
        continue-on-error: true

      # ── Step 1: Upload JUnit XML to QA Capsule ─────────────────────────────
      - name: Upload results to QA Capsule
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          QA_CAPSULE_API_ROBOT_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
        run: |
          echo "Uploading JUnit XML to QA Capsule..."
          HTTP_STATUS=$(curl -s -o /tmp/qac-ingest.json -w "%{http_code}" \
            -X POST "${QA_CAPSULE_URL}/api/webhooks/upload?framework=RobotFramework" \
            -H "X-API-Key: ${QA_CAPSULE_API_ROBOT_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}-${{ github.run_attempt }}" \
            -H "X-Commit-Sha: ${{ github.sha }}" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Execution-Env: STAGING" \
            -H "X-Execution-Type: TEST-RUN" \
            -F "file=@tests/results/robot-junit.xml")

          echo "QA Capsule HTTP status: $HTTP_STATUS"
          cat /tmp/qac-ingest.json

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "WARNING: ingestion returned HTTP $HTTP_STATUS. Check your secrets."
          else
            echo "Results queued for processing."
          fi

      # ── Step 2: Self-Healing Gate ──────────────────────────────────────────
      # Waits for the async ingest worker to process the XML, then asks QA
      # Capsule to return the AI-powered healing analysis for every failure.
      # Requires Groq or Gemini API key configured in QA Capsule UI
      # (Settings -> AI & Self-Healing, manager role only).
      - name: Self-Healing Gate
        if: steps.robot_run.outcome == 'failure'
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          QA_CAPSULE_API_ROBOT_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
        run: |
          echo "Waiting for QA Capsule to process the results..."
          sleep 10

          echo "Calling Self-Healing Gate..."
          curl -s \
            -X POST "${QA_CAPSULE_URL}/api/healing/gate" \
            -H "X-API-Key: ${QA_CAPSULE_API_ROBOT_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Framework: RobotFramework" \
            | tee /tmp/healing-report.json || true

          echo ""
          echo "--- Self-Healing Report ---"
          if command -v jq &>/dev/null; then
            jq '.' /tmp/healing-report.json 2>/dev/null || cat /tmp/healing-report.json
          else
            cat /tmp/healing-report.json
          fi
          echo ""
          echo "Open QA Capsule -> Self-Healing Hub to view the full AI fix proposal."
          echo "In Cursor: run the heal_incident MCP tool with the incident ID shown above."

      # ── Step 3: Fail the pipeline on test failures ─────────────────────────
      - name: Fail pipeline on test failures
        if: steps.robot_run.outcome == 'failure'
        run: |
          echo "FAILED: One or more Robot Framework tests failed."
          echo "Check QA Capsule -> Self-Healing Hub for AI fix proposals."
          exit 1

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload Robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ github.run_id }}
          path: |
            tests/results/robot-junit.xml
            tests/results/robot-log.html
            tests/results/robot-report.html
          if-no-files-found: ignore
