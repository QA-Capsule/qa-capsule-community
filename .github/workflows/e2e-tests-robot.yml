name: E2E Tests | Robot Framework

# Manual workflow — sample tests include intentional failures for self-healing demos.
on:
  workflow_dispatch:

jobs:
  robot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Robot Framework and Browser library
        run: |
          pip install --upgrade pip
          pip install robotframework robotframework-browser

      - name: Install Playwright browsers for Robot
        run: rfbrowser init chromium

      - name: Run Robot Framework tests
        id: robot_run
        run: |
          robot \
            --outputdir tests/results \
            --xunit     robot-junit.xml \
            --log       robot-log.html \
            --report    robot-report.html \
            --listener  tests/robotframework/resources/dom_capture_listener.py \
            tests/robotframework/practice_login.robot \
            tests/robotframework/smoke_tests.robot \
            tests/robotframework/api_health.robot
        continue-on-error: true

      - name: Upload results to QA Capsule
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
        run: |
          chmod +x .github/scripts/upload-junit-to-qacapsule.sh
          .github/scripts/upload-junit-to-qacapsule.sh \
            tests/results/robot-junit.xml \
            RobotFramework \
            "${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Self-Healing Gate
        if: always() && steps.robot_run.outcome == 'failure'
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
        run: |
          chmod +x .github/scripts/healing-gate.sh
          .github/scripts/healing-gate.sh "${{ github.run_id }}" RobotFramework

      - name: Fail pipeline on test failures
        if: steps.robot_run.outcome == 'failure'
        run: |
          echo "FAILED: One or more Robot Framework tests failed (expected for self-healing demo suites)."
          exit 1

      - name: Upload Robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ github.run_id }}
          path: |
            tests/results/robot-junit.xml
            tests/results/robot-log.html
            tests/results/robot-report.html
          if-no-files-found: ignore
