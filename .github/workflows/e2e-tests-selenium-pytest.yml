name: E2E Tests | Selenium + Pytest

on:
  workflow_dispatch:

jobs:
  run-selenium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Dependencies
        run: pip install -r tests/selenium-pytest/requirements.txt

      - name: Run Selenium Tests
        run: pytest tests/selenium-pytest/ -v --junitxml=selenium-results.xml
        continue-on-error: true

      - name: Send Alert to QA Capsule
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_SELENIUM_KEY }}
        run: |
          curl -X POST "$WEBHOOK_URL/api/webhooks/upload?framework=Pytest" \
            -H "X-API-Key: $API_KEY" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Execution-Env: STAGING" \
            -H "X-Execution-Type: TEST-RUN" \
            -F "file=@selenium-results.xml"

      - name: MCP Healing Gate
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_SELENIUM_KEY }}
        run: |
          curl -s -X POST "$WEBHOOK_URL/api/healing/gate" \
            -H "X-API-Key: $API_KEY" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Framework: Selenium" \
            | tee healing-report.json || true
          echo "--- MCP Healing Report ---"
          cat healing-report.json 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: selenium-results.xml
          if-no-files-found: ignore
