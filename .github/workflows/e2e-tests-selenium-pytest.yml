name: E2E Tests | Selenium + Pytest

on:
  workflow_dispatch:

jobs:
  run-selenium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Dependencies
        run: pip install -r tests/selenium-pytest/requirements.txt

      - name: Run Selenium Tests
        run: pytest tests/selenium-pytest/ -v --junitxml=selenium-results.xml
        continue-on-error: true

      - name: Send Alert to QA Capsule
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_SELENIUM_KEY }}
        run: |
          chmod +x .github/scripts/upload-junit-to-qacapsule.sh
          .github/scripts/upload-junit-to-qacapsule.sh selenium-results.xml Pytest "${{ github.run_id }}"

      - name: MCP Healing Gate
        if: always()
        env:
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_SELENIUM_KEY }}
        run: |
          chmod +x .github/scripts/healing-gate.sh
          .github/scripts/healing-gate.sh "${{ github.run_id }}" Selenium

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: selenium-results.xml
          if-no-files-found: ignore
