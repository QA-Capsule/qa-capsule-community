name: Robot Framework Pipeline

on:
  workflow_dispatch:

jobs:
  robot:
    runs-on: ubuntu-latest
    env:
      QA_CAPSULE_SKIP_UPLOAD: "true"
      CI_PIPELINE_ID: ${{ github.run_id }}
      QA_CAPSULE_EXEC_ENV: STAGING
      QA_CAPSULE_EXEC_TYPE: TEST-RUN
      SELENIUM_ENABLED: "true"
      SELENIUM_BROWSER: headlesschrome
      UI_BASE_URL: https://example.com
      OUTPUT_DIR: tests/results

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Chrome for UI suites
        uses: browser-actions/setup-chrome@v1

      - name: Install curl
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl

      - name: Run all Robot Framework suites
        id: robot
        run: |
          echo "Suites: smoke_tests, api_health, demo_failure (fail), ui_navigation"
          chmod +x scripts/run-tests.sh
          ./scripts/run-tests.sh
        continue-on-error: true

      - name: Send Alert to QA Capsule
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
        run: |
          JUNIT_FILE="tests/results/robot-junit.xml"
          # Legacy rebot bug: path was doubled under outputdir
          if [ ! -f "$JUNIT_FILE" ] && [ -f "tests/results/tests/results/robot-junit.xml" ]; then
            JUNIT_FILE="tests/results/tests/results/robot-junit.xml"
          fi
          if [ ! -f "$JUNIT_FILE" ]; then
            JUNIT_FILE="$(find tests/results -name 'robot-junit.xml' -type f 2>/dev/null | head -1)"
          fi
          if [ -z "${JUNIT_FILE}" ] || [ ! -f "$JUNIT_FILE" ]; then
            echo "::error::JUnit report not found under tests/results/. Check Robot/rebot logs above."
            ls -laR tests/results 2>/dev/null || true
            exit 1
          fi
          echo "Using JUnit file: ${JUNIT_FILE}"
          if [ -z "${WEBHOOK_URL}" ] || [ -z "${API_KEY}" ]; then
            echo "::error::Set secrets QA_CAPSULE_URL and QA_CAPSULE_API_ROBOT_KEY in repository settings."
            exit 1
          fi
          echo "Uploading Robot Framework JUnit XML to QA Capsule..."
          curl -f -S -X POST "${WEBHOOK_URL}/api/webhooks/upload?framework=RobotFramework" \
            -H "X-API-Key: ${API_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Execution-Env: STAGING" \
            -H "X-Execution-Type: TEST-RUN" \
            -F "file=@${JUNIT_FILE}"

      - name: Fail job if Robot tests failed
        if: steps.robot.outcome == 'failure'
        run: |
          echo "Robot Framework reported test failures (expected for demo_failure.robot)."
          exit 1

      - name: Upload Robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: |
            tests/results/output.xml
            tests/results/log.html
            tests/results/report.html
            tests/results/robot-junit.xml
          if-no-files-found: ignore
