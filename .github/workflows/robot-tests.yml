name: Robot Framework Pipeline

on:
  workflow_dispatch:

jobs:
  robot:
    runs-on: ubuntu-latest
    env:
      QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
      # Prefer Robot-specific key; fall back to generic project key if configured.
      QA_CAPSULE_API_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY != '' && secrets.QA_CAPSULE_API_ROBOT_KEY || secrets.QA_CAPSULE_API_KEY }}
      CI_PIPELINE_ID: ${{ github.run_id }}
      QA_CAPSULE_EXEC_ENV: STAGING
      QA_CAPSULE_EXEC_TYPE: TEST-RUN
      SELENIUM_ENABLED: "false"
      OUTPUT_DIR: tests/results

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install curl
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl

      - name: Run Robot Framework suites
        run: |
          chmod +x scripts/run-tests.sh
          ./scripts/run-tests.sh

      - name: Upload Robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: |
            tests/results/output.xml
            tests/results/log.html
            tests/results/report.html
            tests/results/robot-junit.xml
          if-no-files-found: ignore
