# Robot Framework → JUnit XML → QA Capsule
# Aligné sur api-tests-pytest.yml / e2e-tests-playwright.yml
#
# Secrets GitHub (Settings → Secrets and variables → Actions) :
#   QA_CAPSULE_URL              Base URL sans slash final (ex. https://qa-capsule.example.com)
#   QA_CAPSULE_API_ROBOT_KEY    Clé API du projet Robot (CI/CD Gateways)
#   — ou QA_CAPSULE_API_KEY si vous réutilisez une seule clé pour tous les workflows

name: Robot Framework Pipeline

on:
  workflow_dispatch:

jobs:
  run-robot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Robot Framework
        run: pip install robotframework

      - name: Create demo Robot tests (pass + intentional failures)
        run: |
          mkdir -p tests/robotframework tests/results
          cat << 'EOF' > tests/robotframework/qacapsule_demo.robot
          *** Settings ***
          Documentation    QA Capsule demo — mixed pass/fail for pipeline + report testing
          Library          BuiltIn

          *** Test Cases ***
          Sanity check should pass
              [Documentation]    Always green
              Should Be Equal    ${1}    ${1}

          Assertion failure for QA Capsule
              [Documentation]    Intentional failure — appears in JUnit and QA Capsule dashboard
              Log To Console     [STDOUT] Comparing unexpected values
              Log                [STDERR] Deliberate mismatch    level=WARN
              Should Be Equal    ${50}    ${150}    msg=Expected cart total 150, got 50

          Runtime keyword failure
              [Documentation]    Second failure for multi-incident reports
              ${status}=    Set Variable    500
              Should Be Equal As Integers    ${status}    200    msg=API returned 500
          EOF

      - name: Run Robot Framework Tests
        id: robot
        run: |
          robot --outputdir tests/results --loglevel INFO tests/robotframework
        continue-on-error: true

      - name: Convert Robot output to JUnit XML
        if: always()
        run: |
          if [ -f tests/results/output.xml ]; then
            echo "Converting Robot output.xml → JUnit (robot-junit.xml)..."
            rebot --xunit tests/results/robot-junit.xml \
              --outputdir tests/results \
              --log NONE --report NONE \
              tests/results/output.xml
            echo "--- JUnit summary (first 40 lines) ---"
            head -n 40 tests/results/robot-junit.xml || true
          else
            echo "::error::No Robot output.xml — tests did not produce results."
            exit 1
          fi

      - name: Send Alert to QA Capsule
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.QA_CAPSULE_URL }}
          API_KEY: ${{ secrets.QA_CAPSULE_API_ROBOT_KEY }}
          API_KEY_FALLBACK: ${{ secrets.QA_CAPSULE_API_KEY }}
          QA_CAPSULE_EXEC_ENV: STAGING
          QA_CAPSULE_EXEC_TYPE: TEST-RUN
        run: |
          KEY="${API_KEY:-$API_KEY_FALLBACK}"
          if [ -z "$WEBHOOK_URL" ] || [ -z "$KEY" ]; then
            echo "::warning::Skip upload: set QA_CAPSULE_URL and QA_CAPSULE_API_ROBOT_KEY (or QA_CAPSULE_API_KEY)."
            exit 0
          fi
          if [ ! -f tests/results/robot-junit.xml ]; then
            echo "::error::robot-junit.xml not found — cannot send report to QA Capsule."
            exit 1
          fi
          echo "Uploading Robot JUnit XML to QA Capsule..."
          HTTP_CODE=$(curl -sS -o /tmp/qc-upload.json -w "%{http_code}" \
            -X POST "${WEBHOOK_URL}/api/webhooks/upload?framework=RobotFramework" \
            -H "X-API-Key: ${KEY}" \
            -H "X-Run-Id: ${GITHUB_RUN_ID}" \
            -H "X-Execution-Env: ${QA_CAPSULE_EXEC_ENV}" \
            -H "X-Execution-Type: ${QA_CAPSULE_EXEC_TYPE}" \
            -H "X-Branch: ${GITHUB_REF_NAME}" \
            -H "X-Commit-Sha: ${GITHUB_SHA}" \
            -F "file=@tests/results/robot-junit.xml")
          echo "QA Capsule HTTP ${HTTP_CODE}"
          cat /tmp/qc-upload.json
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::QA Capsule upload failed"
            exit 1
          fi

      - name: Upload Robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: |
            tests/results/robot-junit.xml
            tests/results/log.html
            tests/results/report.html
            tests/results/output.xml
          if-no-files-found: ignore

      - name: Fail pipeline if tests failed
        if: steps.robot.outcome == 'failure'
        run: |
          echo "::error::Robot tests failed — see log.html artifact and QA Capsule dashboard (run ${GITHUB_RUN_ID})."
          exit 1
