name: Robot tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      # Vos nouveaux Flags SRE (Métadonnées d'exécution)
      QA_CAPSULE_EXEC_ENV: "STAGING"
      QA_CAPSULE_EXEC_TYPE: "TEST-RUN"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run E2E Tests
        # L'étape exécute les tests (ex: Playwright qui génère playwright-results.xml)
        run: npx playwright test
        continue-on-error: true # Permet de ne pas stopper net le pipeline si un test échoue

      - name: Upload test results to QA Capsule
        if: always() # CRITIQUE : Garantit que l'envoi se fait même si les tests ont planté
        env:
          # Récupération des secrets configurés dans GitHub
          QA_CAPSULE_URL: ${{ secrets.QA_CAPSULE_URL }}
          QA_CAPSULE_API_KEY: ${{ secrets.QA_CAPSULE_API_KEY }}
        run: |
          echo "Envoi du rapport XML à QA Capsule..."
          curl -f -X POST "${QA_CAPSULE_URL}/api/webhooks/upload?framework=Playwright" \
            -H "X-API-Key: ${QA_CAPSULE_API_KEY}" \
            -H "X-Run-Id: ${{ github.run_id }}" \
            -H "X-Execution-Env: ${QA_CAPSULE_EXEC_ENV}" \
            -H "X-Execution-Type: ${QA_CAPSULE_EXEC_TYPE}" \
            -F "file=@playwright-results.xml"

      # (Optionnel) Étape pour forcer l'échec du job GitHub si les tests ont échoué 
      # afin que la PR s'affiche en rouge sur GitHub, car continue-on-error l'avait masqué.
      - name: Check Test Status
        if: steps.run-e2e-tests.outcome == 'failure'
        run: exit 1