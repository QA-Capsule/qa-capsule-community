# GitLab CI — Robot Framework + QA Capsule (même modèle que .github/workflows/e2e-tests-robot.yml)
#
# Variables CI/CD (Settings → CI/CD → Variables, masquées) :
#   QA_CAPSULE_URL
#   QA_CAPSULE_API_ROBOT_KEY  (ou QA_CAPSULE_API_KEY)

stages:
  - test

robot-framework:
  stage: test
  image: python:3.12
  variables:
    SELENIUM_ENABLED: "false"
    QA_CAPSULE_EXEC_ENV: STAGING
    QA_CAPSULE_EXEC_TYPE: TEST-RUN
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    paths:
      - .cache/pip
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - pip install -r tests/requirements.txt
  script:
    - chmod +x scripts/run-tests.sh scripts/quarantine-ci-gate.sh
    - |
      KEY="${QA_CAPSULE_API_ROBOT_KEY:-${QA_CAPSULE_API_KEY:-}}"
      export QA_CAPSULE_API_KEY="$KEY"
      if [ -n "${QA_CAPSULE_URL:-}" ] && [ -n "$KEY" ]; then
        echo "Quarantined tests:"
        ./scripts/quarantine-ci-gate.sh list || true
      fi
    - |
      KEY="${QA_CAPSULE_API_ROBOT_KEY:-${QA_CAPSULE_API_KEY:-}}"
      export QA_CAPSULE_URL QA_CAPSULE_API_KEY="$KEY" CI_PIPELINE_ID="${CI_PIPELINE_ID}"
    - ./scripts/run-tests.sh || ROBOT_FAILED=1
    - test -z "${ROBOT_FAILED:-}"
  artifacts:
    when: always
    paths:
      - tests/results/
    expire_in: 7 days
