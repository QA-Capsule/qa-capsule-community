# Portable QA Capsule — recommended for beta testers (Linux, macOS, Windows).
# Start: docker compose up -d --build
# UI: http://localhost:9000  (admin / admin)

services:
  qacapsule:
    build: .
    container_name: qacapsule-server
    ports:
      - "9000:9000"
    environment:
      APP_ENV: development
      # Required in production (or set in .env file).
      QACAPSULE_JWT_SECRET: ${QACAPSULE_JWT_SECRET:-dev-compose-change-me}
      QACAPSULE_DATA_DIR: /app/data
      # MCP server auth token — sent by Cursor/agents in Authorization: Bearer header.
      # Leave empty in dev (no auth). Set a strong random secret in production.
      QACAPSULE_MCP_TOKEN: ${QACAPSULE_MCP_TOKEN:-}
      # GitHub token — required only for create_remediation_pr MCP tool.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./reports:/app/reports
      - ./plugins:/app/plugins
      - ./config.yaml:/app/config.yaml:ro
      # Named volume avoids host permission issues (root-owned ./data after a prior Docker run).
      - qacapsule_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  qacapsule_data:
