site_name: QA Flight Recorder (QA Capsule)
site_description: Enterprise SRE Control Plane for CI/CD Telemetry, E2E Testing, and Incident Response
site_author: QA Capsule Team
site_url: https://qa-capsule.github.io/qa-capsule-community/
repo_name: QA-Capsule/qa-capsule-community
repo_url: https://github.com/QA-Capsule/qa-capsule-community
edit_uri: edit/main/docs/

theme:
  name: material
  # UI/UX FIX: Set professional fonts (Inter for text, Fira Code for technical blocks)
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    # UI/UX FIX: Professional Enterprise Light Theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # UI/UX FIX: Professional Enterprise Dark Theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Setup & Installation:
      - Docker Deployment: setup/docker.md
      - System Configuration: setup/config.md
      - RBAC & Teams: setup/rbac-teams.md
  - CI/CD Integration:
      - Overview & Architecture: integration/cicd-overview.md
      - JUnit XML : integration/junit-xml-upload.md
      - The SRE Agent: integration/agent.md
      - GitHub Actions: integration/github.md
      - GitLab CI: integration/gitlab.md
      - Jenkins: integration/jenkins.md
  - Dashboard & Operations:
      - Dashboard Guide: guides/dashboard-operations.md
      - Incident Lifecycle: guides/incident-lifecycle.md
      - Analytics & FinOps: guides/finops-analytics.md
      - End-to-End Testing: guides/testing.md
  - Plugin Engine:
      - How Plugins Work: plugins/overview.md
      - Jira Integration: plugins/jira.md
      - Slack Integration: plugins/slack.md
      - MS Teams Integration: plugins/teams.md
  - API Reference:
      - Webhooks API: api/webhooks.md
      - Incidents API: api/incidents-api.md
  - Deployment:
      - Documentation CI/CD: deployment/docs-pipeline.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/QA-Capsule/qa-capsule-community